name: Build Release Artifacts

on:
  workflow_call:
    inputs:
      tag_name:
        required: true
        type: string
      sha:
        required: true
        type: string
  workflow_dispatch:
    inputs:
      tag_name:
        required: true
        type: string
        description: "Existing draft release tag, e.g. python-1.0.8"
      sha:
        required: true
        type: string
        description: "Commit SHA to build from"

permissions:
  contents: read

jobs:
  verify:
    permissions:
      contents: read
    name: Verify versions
    runs-on: ${{ github.repository_owner == 'grafana' && 'ubuntu-x64-small' || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.sha }}
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: stable
      - name: Verify tag matches package version
        env:
          TAG: ${{ inputs.tag_name }}
        run: make check/tag-version
      - name: Verify Cargo version matches Python version
        run: cargo test --locked -- test_cargo_version_matches_python_version
        working-directory: rust

  python-release-linux:
    permissions:
      contents: write
    needs: [verify]
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: manylinux-amd64
            runs-on: ${{ github.repository_owner == 'grafana' && 'ubuntu-x64-large' || 'ubuntu-latest' }}
            make-target: linux/amd64
          - name: manylinux-arm64
            runs-on: ${{ github.repository_owner == 'grafana' && 'ubuntu-arm64-large' || 'ubuntu-24.04-arm' }}
            make-target: linux/arm64
          - name: musllinux-amd64
            runs-on: ${{ github.repository_owner == 'grafana' && 'ubuntu-x64-large' || 'ubuntu-latest' }}
            make-target: musllinux/amd64
          - name: musllinux-arm64
            runs-on: ${{ github.repository_owner == 'grafana' && 'ubuntu-arm64-large' || 'ubuntu-24.04-arm' }}
            make-target: musllinux/arm64
    name: Release python linux - ${{ matrix.name }}
    runs-on: ${{ matrix.runs-on }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.sha }}
          persist-credentials: false
      - run: make ${{ matrix.make-target }}
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ inputs.sha }}-python-${{ matrix.name }}
          path: dist/*

      - name: Upload release artifact
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ inputs.tag_name }}
          draft: true
          files: dist/pyroscope*.whl
  python-release-macos:
    permissions:
      contents: write
    needs: [verify]
    strategy:
      fail-fast: false
      matrix:
        include:
          - macos-version: "14"
            target: x86_64-apple-darwin
            mk-arch: amd64
          - macos-version: "14"
            target: aarch64-apple-darwin
            mk-arch: arm64

    name: macOS - ${{ matrix.target }}
    runs-on: macos-${{ matrix.macos-version }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.sha }}
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: 1.88.0
          target: ${{ matrix.target }}

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # 6.2.0
        with:
          python-version: 3.11

      - run: pip install build wheel
      - run: make mac/${{ matrix.mk-arch }}

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ inputs.sha }}-python-macos-${{ matrix.target }}
          path: dist/*

      - name: Upload release artifact
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ inputs.tag_name }}
          draft: true
          files: dist/pyroscope*.whl
  python-release-sdist:
    permissions:
      contents: write
    needs: [verify]
    name: sdist
    runs-on: ${{ github.repository_owner == 'grafana' && 'ubuntu-x64-small' || 'ubuntu-latest' }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.sha }}
          persist-credentials: false

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # 6.2.0
        with:
          python-version: "3.10"
      - run: python -m pip install build
      - run: python -m build --sdist
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ inputs.sha }}-python-sdist
          path: dist/*

      - name: Upload release artifact
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ inputs.tag_name }}
          draft: true
          files: dist/pyroscope_io-*.tar.gz
