name: Python Release

on:
  push:
    tags:
      - 'python-*'

jobs:
  python-release-linux:
    permissions:
      contents: write
    needs: [ 'python-release' ]
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: manylinux-amd64
            runs-on: ${{ github.repository_owner == 'grafana' && 'ubuntu-x64-large' || 'ubuntu-latest' }}
            make-target: linux/amd64
          - name: manylinux-arm64
            runs-on: ${{ github.repository_owner == 'grafana' && 'ubuntu-arm64-large' || 'ubuntu-24.04-arm' }}
            make-target: linux/arm64
          - name: musllinux-amd64
            runs-on: ${{ github.repository_owner == 'grafana' && 'ubuntu-x64-large' || 'ubuntu-latest' }}
            make-target: musllinux/amd64
          - name: musllinux-arm64
            runs-on: ${{ github.repository_owner == 'grafana' && 'ubuntu-arm64-large' || 'ubuntu-24.04-arm' }}
            make-target: musllinux/arm64
    name: Release python linux - ${{ matrix.name }}
    runs-on: ${{ matrix.runs-on }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - run: make ${{ matrix.make-target }}
      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ${{ github.sha }}-python-${{ matrix.name }}
          path: dist/*

      - name: Upload release artifact
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          draft: true
          files: dist/pyroscope*.whl
  python-release-macos:
    permissions:
      contents: write
    needs: [ 'python-release' ]
    strategy:
      fail-fast: false
      matrix:
        include:
          - macos-version: "14"
            target: x86_64-apple-darwin
            mk-arch: amd64
          - macos-version: "14"
            target: aarch64-apple-darwin
            mk-arch: arm64

    name: macOS - ${{ matrix.target }}
    runs-on: macos-${{ matrix.macos-version }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: 1.88.0
          target: ${{ matrix.target }}

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # 6.2.0
        with:
          python-version: 3.11

      - run: pip install build wheel
      - run: make mac/${{ matrix.mk-arch }}

      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ${{ github.sha }}-python-macos-${{ matrix.target }}
          path: dist/*

      - name: Upload release artifact
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          draft: true
          files: dist/pyroscope*.whl
  python-release-sdist:
    permissions:
      contents: write
    needs: [ 'python-release' ]
    name: sdist
    runs-on: ${{ github.repository_owner == 'grafana' && 'ubuntu-x64-small' || 'ubuntu-latest' }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # 6.2.0
        with:
          python-version: "3.10"
      - run: python -m pip install build
      - run: python -m build --sdist
      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ${{ github.sha }}-python-sdist
          path: dist/*

      - name: Upload release artifact
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          draft: true
          files: dist/pyroscope_io-*.tar.gz
  python-release:
    permissions:
      contents: write
    name: Python Package
    runs-on: ${{ github.repository_owner == 'grafana' && 'ubuntu-x64-small' || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: stable
      - name: Verify tag matches package version
        env:
          TAG: ${{ github.ref_name }}
        run: make check/tag-version
      - name: Verify Cargo version matches Python version
        run: cargo test --locked -- test_cargo_version_matches_python_version
        working-directory: rust
      - id: auto-release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          tag_name: "${{ github.ref_name }}"
          name: "Python Package: ${{ github.ref_name }}"
          draft: true
          prerelease: false
